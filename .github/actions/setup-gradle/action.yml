name: 'Setup Gradle Build'
description: 'Setup JDK and Gradle for BerryCrush builds. Note: checkout must be done BEFORE using this action.'

inputs:
  java-version:
    description: 'Java version to use'
    required: false
    default: '21'
  java-distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'

runs:
  using: 'composite'
  steps:
    - name: Setup JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.java-distribution }}
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
